apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: http-app
  namespace: ourcoolnamespace
spec:
  podSelector:
    matchLabels:
      app: http-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
  egress:
    # k3s Service CIDR — DNS (kube-dns ClusterIP) и сервисы вроде istiod
    - to:
        - ipBlock:
            cidr: 10.43.0.0/16
    # Pod CIDR — east-west между подами
    - to:
        - ipBlock:
            cidr: 10.42.0.0/16
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
