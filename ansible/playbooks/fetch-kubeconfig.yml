---
# Скачивает kubeconfig с control plane на машину, где запущен ansible-playbook.
# Запуск: ansible-playbook playbooks/fetch-kubeconfig.yml
- name: Fetch kubeconfig from control plane
  hosts: server
  become: true
  gather_facts: false
  tasks:
    - name: Read k3s kubeconfig
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_raw

    - name: Save kubeconfig locally
      ansible.builtin.copy:
        content: "{{ kubeconfig_raw.content | b64decode | regex_replace('127.0.0.1', cp_ip) }}"
        dest: "{{ playbook_dir }}/../kubeconfig"
        mode: "0600"
      delegate_to: localhost
      become: false
      run_once: true

    - name: Kubeconfig path
      ansible.builtin.debug:
        msg: "Saved to {{ playbook_dir }}/../kubeconfig (server: {{ cp_ip }})"
      run_once: true
