---
- name: Prepare all cluster nodes
  hosts: k3s_cluster
  become: true
  gather_facts: true
  roles:
    - common

- name: Install k3s control plane
  hosts: server
  become: true
  gather_facts: false
  roles:
    - k3s_server

- name: Join worker nodes
  hosts: agent
  become: true
  gather_facts: false
  roles:
    - k3s_agent

- name: Verify cluster
  hosts: server
  become: true
  gather_facts: false
  tasks:
    - name: Get nodes
      ansible.builtin.command: k3s kubectl get nodes -o wide
      register: cluster_nodes
      changed_when: false

    - name: Show cluster status
      ansible.builtin.debug:
        msg: "{{ cluster_nodes.stdout_lines }}"

- name: Install Istio service mesh
  hosts: server
  become: true
  gather_facts: true
  tags:
    - istio
    - mesh
    - never
  roles:
    - istio

- name: Deploy http-app manifests
  hosts: server
  become: true
  gather_facts: false
  vars:
    app_project_root: "{{ playbook_dir }}/../.."
  tags:
    - app
    - deploy
    - never
  roles:
    - app_deploy
