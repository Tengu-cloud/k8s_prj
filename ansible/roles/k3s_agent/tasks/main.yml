---
- name: Resolve k3s join token from control plane
  ansible.builtin.set_fact:
    k3s_join_token: "{{ hostvars[groups['server'][0]]['k3s_node_token'] }}"

- name: Fail if join token is missing
  ansible.builtin.fail:
    msg: "k3s_node_token not found on {{ groups['server'][0] }}. Run server role first."
  when: k3s_join_token is not defined or k3s_join_token | length == 0

- name: Build k3s agent install environment
  ansible.builtin.set_fact:
    k3s_agent_install_env:
      K3S_URL: "{{ k3s_server_url }}"
      K3S_TOKEN: "{{ k3s_join_token }}"
      INSTALL_K3S_VERSION: "{{ k3s_version }}"
  when: k3s_version | length > 0

- name: Build k3s agent install environment (latest version)
  ansible.builtin.set_fact:
    k3s_agent_install_env:
      K3S_URL: "{{ k3s_server_url }}"
      K3S_TOKEN: "{{ k3s_join_token }}"
  when: k3s_version | length == 0

- name: Download k3s install script
  ansible.builtin.get_url:
    url: "{{ k3s_install_script_url }}"
    dest: "{{ k3s_install_script_path }}"
    mode: "0755"

- name: Install k3s agent
  ansible.builtin.shell: >-
    {{ k3s_install_script_path }} agent
    --node-name {{ inventory_hostname }}
    --node-ip {{ node_ip }}
  environment: "{{ k3s_agent_install_env }}"
  args:
    creates: /etc/systemd/system/k3s-agent.service

- name: Ensure k3s-agent is running
  ansible.builtin.systemd:
    name: k3s-agent
    state: started
    enabled: true
