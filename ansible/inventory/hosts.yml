---
# Подставьте ansible_host (IP) и при необходимости ansible_user / ansible_ssh_private_key_file.
all:
  children:
    k3s_cluster:
      children:
        server:
          hosts:
            k8s-control-plane:
              ansible_host: 192.168.1.10
              node_ip: 192.168.1.10
        agent:
          hosts:
            k8s-worker-1:
              ansible_host: 192.168.1.11
              node_ip: 192.168.1.11
            k8s-worker-2:
              ansible_host: 192.168.1.12
              node_ip: 192.168.1.12
